name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '*.html'
      - 'assets/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir _site
          find . -maxdepth 1 -type f \( -name '*.html' -o -name '*.css' -o -name '*.js' -o -name '*.json' -o -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o -name '*.webp' -o -name '*.svg' -o -name '*.ico' \) -exec cp {} _site/ \;
          if [ -d assets ]; then cp -R assets _site/assets; fi
          python - <<'PY'
          from pathlib import Path

          # ダッシュボードの経費ボタンと人件費パッチ
          p = Path('_site/index.html')
          text = p.read_text(encoding='utf-8')
          old = '<button id="t_expenses" onclick="showTab(\'expenses\')">仕入・外注・経費</button>'
          new = '<button id="t_expenses" onclick="location.href=\'./expenses.html\'">仕入・外注・経費 ↗</button>'
          if old in text:
              text = text.replace(old, new, 1)
          patch = '<script src="./assets/labor-cost-patch.js"></script>'
          if patch not in text:
              text = text.replace('</body>', patch + '</body>', 1)

          # 通帳のカタカナ印字・手書きメモを正式名称へ統一
          replacements = {
              'ゼイリシクミアイ': '岡税理士事務所',
              'カ）イマイ': '株式会社イマイ',
              'カ)イマイ': '株式会社イマイ',
              'オオクマショウテン': '大熊商店',
              'オオワクショウテン': '大熊商店',
              'ノウユウ': '農友（豚肉・その他食材）',
              'NSSシャロウシ': 'MAST社会保険労務士法人',
              'NSS.シャロウシ': 'MAST社会保険労務士法人',
              'イモンホームズ': 'イモンホームズ（駐車場賃貸）',
              'ケイヒ': '現金経費',
          }
          for src, dst in replacements.items():
              text = text.replace(src, dst)
          p.write_text(text, encoding='utf-8')

          # 経費ページへ通帳照合結果を反映
          ep = Path('_site/expenses.html')
          if ep.exists():
              e = ep.read_text(encoding='utf-8')
              for src, dst in replacements.items():
                  e = e.replace(src, dst)

              e = e.replace(
                  '<tr><td>社労士顧問料</td><td>2026年6月</td><td class="num">¥20,000</td><td class="num">¥2,000</td><td class="num">¥22,000</td><td>専門家報酬</td><td>2026年6月</td><td>2026年8月予定</td></tr>',
                  '<tr><td>MAST社会保険労務士法人</td><td>2026年6月</td><td class="num">¥20,000</td><td class="num">¥2,000</td><td class="num">¥22,000</td><td>社労士顧問料（基本定額）</td><td>2026年6月</td><td>2026年6月22日</td></tr>'
              )
              e = e.replace(
                  '<tr><td>社労士顧問料</td><td>6月顧問契約</td><td class="num">¥22,000</td><td>2026年6月</td><td>2026/8/22予定</td></tr>',
                  '<tr><td>MAST社会保険労務士法人</td><td>社労士顧問料（基本定額）</td><td class="num">¥22,000</td><td>2026年6月</td><td>2026/6/22引落確認</td></tr>'
              )
              e = e.replace(
                  '<tr><td>2026年8月予定</td><td class="num">¥22,000</td><td>社労士顧問料</td></tr>',
                  '<tr><td>2026年6月</td><td class="num">¥22,000</td><td>MAST社会保険労務士法人・基本定額</td></tr>'
              )

              bankbook_section = '''
          <section class="panel"><div class="section-title"><h2>通帳印字・手書きメモの正式名称</h2><span class="mini">通帳画像1〜7ページの確認内容</span></div>
          <div class="scroll"><table><thead><tr><th>通帳上の表記</th><th>サイト表示</th><th>分類・取扱い</th></tr></thead><tbody>
          <tr><td>ゼイリシクミアイ</td><td>岡税理士事務所</td><td>税理士報酬（基本定額）／7月3日引落も同じ取引先</td></tr>
          <tr><td>カ）イマイ</td><td>株式会社イマイ</td><td>ビール・酒類・飲料仕入</td></tr>
          <tr><td>オオクマショウテン</td><td>大熊商店</td><td>食材仕入</td></tr>
          <tr><td>ノウユウ</td><td>農友</td><td>豚肉・その他食材仕入</td></tr>
          <tr><td>NSSシャロウシ</td><td>MAST社会保険労務士法人</td><td>社労士顧問料・基本定額引落</td></tr>
          <tr><td>イモンホームズ</td><td>イモンホームズ</td><td>駐車場賃貸料</td></tr>
          <tr><td>ケイヒ</td><td>現金経費</td><td>現金引出しによる経費</td></tr>
          <tr><td>社長</td><td>社長領収書精算</td><td>領収書に基づく経費決済</td></tr>
          <tr><td>不足／不足分</td><td>売上不足補填</td><td>売上入金の不足補填</td></tr>
          </tbody></table></div></section>
          '''
              if '通帳印字・手書きメモの正式名称' not in e:
                  e = e.replace('</main>', bankbook_section + '</main>')
              ep.write_text(e, encoding='utf-8')
          PY
          touch _site/.nojekyll
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4