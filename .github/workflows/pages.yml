name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '*.html'
      - 'assets/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Prepare static site
        run: |
          rm -rf _site
          mkdir _site
          find . -maxdepth 1 -type f \( -name '*.html' -o -name '*.css' -o -name '*.js' -o -name '*.json' -o -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o -name '*.webp' -o -name '*.svg' -o -name '*.ico' \) -exec cp {} _site/ \;
          if [ -d assets ]; then cp -R assets _site/assets; fi
          python - <<'PY'
          from pathlib import Path
          p = Path('_site/index.html')
          text = p.read_text(encoding='utf-8')
          old = '<button id="t_expenses" onclick="showTab(\'expenses\')">仕入・外注・経費</button>'
          new = '<button id="t_expenses" onclick="location.href=\'./expenses.html\'">仕入・外注・経費 ↗</button>'
          if old in text:
              text = text.replace(old, new, 1)
          patch = '<script src="./assets/labor-cost-patch.js"></script>'
          if patch not in text:
              text = text.replace('</body>', patch + '</body>', 1)
          p.write_text(text, encoding='utf-8')
          PY
          touch _site/.nojekyll
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
