function embeddedKey(url){
 if(url==='/api/bootstrap')return 'bootstrap';
 if(url==='/api/monthly')return 'monthly';
 if(url==='/api/payroll')return 'payroll';
 const m=url.match(/^\/api\/([^/]+)\/(.+)$/);
 if(!m)throw new Error('未対応のデータ参照: '+url);
 return m[1]+'_'+m[2];
}
async function api(url,opt){
 if(opt)throw new Error('公開Web版は閲覧専用です');
 const key=embeddedKey(url);
 if(!(key in EMBEDDED_DATA))throw new Error('データ未配置: '+key);
 return JSON.parse(JSON.stringify(EMBEDDED_DATA[key]));
}

function scopeLabel(){return state.scope==='all'?'累計（全期間）':ymLabel(state.month)}
function monthChanged(){state.month=$('monthSelect').value;if(state.scope!=='month')setScope('month');else reloadCurrent()}
async function setScope(scope){state.scope=scope;$('scopeMonth').classList.toggle('active',scope==='month');$('scopeAll').classList.toggle('active',scope==='all');$('monthSelect').disabled=scope==='all';await reloadCurrent()}
async function reloadCurrent(){state.month=$('monthSelect').value;const s=currentScope();const [ov,d,p,h,b,q]=await Promise.all([api('/api/overview/'+s),api('/api/daily/'+s),api('/api/products/'+s),api('/api/hourly/'+s),api('/api/bank/'+s),api('/api/quality/'+s)]);state.overview=ov;state.quality=q;state.daily=d;state.products=p;state.hourly=h.rows;state.bank=b;renderCards(ov);renderIntegrity(q);await showTab(state.tab);$('updated').textContent='データ更新 2026/7/18（通帳6・7頁反映）'}
function priorMetric(month,key){const i=state.monthly.findIndex(x=>x.month===month);if(i<=0)return null;return state.monthly[i-1][key]}
function diffHtml(current,previous){if(previous===null||previous===undefined||Number(previous)===0)return '<span class="sub">前月比較なし</span>';const d=(Number(current)-Number(previous))/Number(previous);return `<span class="${d>=0?'up':'down'}">前月比 ${d>=0?'+':''}${(d*100).toFixed(1)}%</span>`}
function renderCards(d){let cards;if(state.scope==='all'){cards=[['累計売上',yen(d.total_sales),'全期間'],['累計客数',Number(d.total_customers).toLocaleString()+'人','全期間'],['累計営業日数',d.total_days+'日','売上0円の日を除外'],['累計平均日商',yen(d.avg_daily),'累計売上÷営業日数'],['累計客単価',yen(d.avg_spend),'累計売上÷累計客数'],['対象月数',d.month_count+'か月','登録済みの月'],['月平均売上',yen(d.avg_monthly),'累計売上÷対象月数'],['1日平均客数',Number(d.avg_customers_per_day||0).toFixed(1)+'人','累計客数÷営業日数']]}else{const pSales=priorMetric(d.month,'sales'),pDaily=priorMetric(d.month,'avg_daily'),pSpend=priorMetric(d.month,'avg_spend');cards=[['累計売上',yen(d.total_sales),'全期間'],['累計客数',Number(d.total_customers).toLocaleString()+'人','全期間'],['累計営業日数',d.total_days+'日','売上0円の日を除外'],[ymLabel(d.month)+'売上',yen(d.month_sales),diffHtml(d.month_sales,pSales)],[ymLabel(d.month)+'平均日商',yen(d.avg_daily),diffHtml(d.avg_daily,pDaily)],[ymLabel(d.month)+'客単価',yen(d.avg_spend),diffHtml(d.avg_spend,pSpend)],[ymLabel(d.month)+'営業日数',d.month_days+'日','休業・入力待ちは除外'],[ymLabel(d.month)+'着地予測',yen(d.projection),'平均日商×27営業日']]}$('cards').innerHTML=cards.map(x=>`<div class="card"><div class="label">${x[0]}</div><div class="big">${x[1]}</div><div class="sub">${x[2]}</div></div>`).join('')}
function renderIntegrity(q){const diffP=q.daily-q.products;$('integrity').innerHTML=`<div class="notice ${q.matched?'ok':'ng'}"><b>${scopeLabel()} 売上検算 ${q.matched?'一致':'要確認'}</b>　日別（精算後）${yen(q.daily)}／商品別 ${yen(q.products)}${q.product_match?' 一致':` 差額 ${yen(diffP)}`}／時間帯（発行）${yen(q.hourly)}＋精算差額 ${yen(q.settlement_adjustment)}＝${yen(q.hourly_net)} ${q.hourly_match?'一致':'不一致'}　休業 ${q.holidays}日／入力待ち ${q.pending}日</div>`}
async function showTab(tab){state.tab=tab;document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));$('t_'+tab)?.classList.add('active');$('host').innerHTML='<div class="panel">読み込み中...</div>';
 if(tab==='overview')return renderOverview();if(tab==='monthly')return renderMonthly();if(tab==='management')return renderManagementMonthly();if(tab==='payroll')return renderPayroll();if(tab==='consulting')return renderConsulting();if(tab==='daily')return renderDaily();if(tab==='weekday')return renderWeekday();if(tab==='products')return renderProducts();if(tab==='abc')return renderABC();if(tab==='beer')return renderBeer();if(tab==='hourly')return renderHourly();if(tab==='bank')return renderBank();if(tab==='expenses')return renderExpenses();if(tab==='quality')return renderQuality()}
function compactYen(v){const n=Math.round(Number(v||0));if(Math.abs(n)>=1000000)return (n/1000000).toFixed(1)+'百万円';if(Math.abs(n)>=10000)return (n/10000).toFixed(1)+'万円';return n.toLocaleString()+'円'}
function formatGraphValue(v,format='yen'){if(format==='percent')return Number(v||0).toFixed(1)+'%';if(format==='count')return Math.round(Number(v||0)).toLocaleString();return yen(v)}
function graphMeta(unit,detail=''){return `<div class="chartMeta">単位：${unit}${detail?'　'+detail:''}</div>`}
function lineSvg(rows){const data=rows.map(r=>({label:state.scope==='all'?String(r.business_date).slice(2).replaceAll('-','/'):dayLabel(r.business_date),value:+r.total_sales||0,date:r.business_date}));const W=900,H=340,pL=65,pR=20,pT=34,pB=52,max=Math.max(1,...data.map(x=>x.value));const step=(W-pL-pR)/Math.max(1,data.length-1);const pts=data.map((x,i)=>[pL+i*step,H-pB-(x.value/max)*(H-pT-pB)]);let svg=`<svg viewBox="0 0 ${W} ${H}" aria-label="日別売上推移">`;for(let i=0;i<5;i++){const y=pT+i*(H-pT-pB)/4,val=max*(1-i/4);svg+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#dbe3ef"/><text x="${pL-8}" y="${y+4}" text-anchor="end" font-size="11">${compactYen(val)}</text>`}svg+=`<text x="8" y="18" font-size="12" font-weight="700">売上（円）</text><polyline fill="none" stroke="#17365d" stroke-width="3" points="${pts.map(a=>a.join(',')).join(' ')}"/>`;const labelEvery=Math.max(1,Math.ceil(data.length/14));pts.forEach((a,i)=>{const zero=data[i].value===0;svg+=`<circle cx="${a[0]}" cy="${a[1]}" r="${zero?5:4}" fill="${zero?'#dc2626':'#4472c4'}"><title>${data[i].date} ${yen(data[i].value)}</title></circle>`;if(i%labelEvery===0||i===data.length-1){svg+=`<text class="valueLabel" x="${a[0]}" y="${Math.max(18,a[1]-9)}" text-anchor="middle">${compactYen(data[i].value)}</text><text x="${a[0]}" y="${H-17}" text-anchor="middle" font-size="10" transform="rotate(-35 ${a[0]} ${H-17})">${data[i].label}</text>`}});return svg+'</svg>'}
function barSvg(rows,labelKey='label',valueKey='value',opts={}){const format=opts.format||'yen',showShare=opts.showShare!==false,total=opts.total??rows.reduce((s,x)=>s+(+x[valueKey]||0),0);const W=900,H=340,pL=65,pR=20,pT=42,pB=65,max=Math.max(1,...rows.map(x=>+x[valueKey]||0));const bw=(W-pL-pR)/Math.max(1,rows.length);let svg=`<svg viewBox="0 0 ${W} ${H}">`;for(let i=0;i<5;i++){const y=pT+i*(H-pT-pB)/4,val=max*(1-i/4),axis=format==='percent'?val.toFixed(1)+'%':compactYen(val);svg+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#dbe3ef"/><text x="${pL-8}" y="${y+4}" text-anchor="end" font-size="11">${axis}</text>`}rows.forEach((r,i)=>{const v=+r[valueKey]||0,h=v/max*(H-pT-pB),x=pL+i*bw+5,y=H-pB-h,w=Math.max(5,bw-10),share=total?v/total:0;svg+=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3" fill="#5b9bd5"><title>${r[labelKey]} ${formatGraphValue(v,format)}${showShare?' '+pct(share):''}</title></rect><text class="valueLabel" x="${x+w/2}" y="${Math.max(18,y-15)}" text-anchor="middle">${formatGraphValue(v,format)}</text>${showShare&&format!=='percent'?`<text x="${x+w/2}" y="${Math.max(31,y-2)}" text-anchor="middle" font-size="10">${pct(share)}</text>`:''}<text x="${x+w/2}" y="${H-22}" text-anchor="middle" font-size="10" transform="rotate(-28 ${x+w/2} ${H-22})">${escapeHtml(r[labelKey])}</text>`});return svg+'</svg>'}
function horizontalBars(rows,opts={}){const max=Math.max(1,...rows.map(r=>r.value)),total=opts.total??rows.reduce((s,r)=>s+r.value,0),format=opts.format||'yen';return rows.map(r=>{const share=total?r.value/total:0;return `<div class="metric"><span style="width:31%;overflow:hidden;text-overflow:ellipsis" title="${escapeHtml(r.label)}">${escapeHtml(r.label)}</span><div style="width:39%" class="barbg"><div class="barfill" style="width:${r.value/max*100}%"></div></div><b style="width:30%;text-align:right">${formatGraphValue(r.value,format)} <span class="shareText">${pct(share)}</span></b></div>`}).join('')}
function donutSvg(parts){const total=parts.reduce((s,x)=>s+x.value,0)||1;let start=-Math.PI/2;const colors=['#4472c4','#ed7d31','#ffc000','#70ad47','#a5a5a5','#5b9bd5'];let paths='';parts.forEach((x,i)=>{const a=x.value/total*Math.PI*2,end=start+a,r=105,cx=160,cy=145,x1=cx+r*Math.cos(start),y1=cy+r*Math.sin(start),x2=cx+r*Math.cos(end),y2=cy+r*Math.sin(end),large=a>Math.PI?1:0,mid=start+a/2,lx=cx+76*Math.cos(mid),ly=cy+76*Math.sin(mid);paths+=`<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z" fill="${colors[i%colors.length]}"><title>${x.label} ${yen(x.value)} ${pct(x.value/total)}</title></path>${x.value/total>=.045?`<text x="${lx}" y="${ly}" text-anchor="middle" font-size="12" font-weight="700" fill="white">${pct(x.value/total)}</text>`:''}`;start=end});return `<svg viewBox="0 0 650 310"><g>${paths}<circle cx="160" cy="145" r="58" fill="white"/><text x="160" y="138" text-anchor="middle" font-size="14">合計</text><text x="160" y="163" text-anchor="middle" font-size="17" font-weight="700">${yen(total)}</text></g>${parts.map((x,i)=>`<g transform="translate(330,${35+i*48})"><rect width="13" height="13" fill="${colors[i%colors.length]}"/><text x="22" y="12" font-size="14">${x.label}</text><text x="22" y="31" font-size="13">${yen(x.value)}／${pct(x.value/total)}</text></g>`).join('')}</svg>`}
function chartDetailTable(headers,rows){return `<div class="chartDetails">${table(headers,rows,true)}</div>`}
function periodParts(){const m={昼:0,夜:0,深夜:0,その他:0};state.hourly.forEach(r=>m[r.period||'その他']=(m[r.period||'その他']||0)+(+r.sales||0));return [['昼（10:00〜17:59）',m['昼']||0],['夜（18:00〜23:59）',m['夜']||0],['深夜（0:00〜2:59）',m['深夜']||0],['その他（3:00〜9:59）',m['その他']||0]].map(x=>({label:x[0],value:x[1]}))}
function detailCategory(name,base){if(/ビール|コーラ|ジュース|酒|ハイボール|サワー/.test(name))return'飲料';if(/セット/.test(name))return'セット';if(/味噌/.test(name))return'ラーメン・味噌';if(/醤油/.test(name))return'ラーメン・醤油';if(/塩/.test(name))return'ラーメン・塩';if(/餃子/.test(name))return'サイド・餃子';if(/ご飯|ライス|丼/.test(name))return'ご飯・丼';if(/チャーシュー|メンマ|ネギ|玉子|バター|コーン/.test(name))return'追加・トッピング';return base||'その他'}
function renderOverview(){const label=scopeLabel(),productTotal=state.products.reduce((s,x)=>s+x.sales,0),hourTotal=state.hourly.reduce((s,x)=>s+x.sales,0),dailyTotal=state.daily.reduce((s,x)=>s+x.total_sales,0);const top=state.products.slice(0,10).map(x=>({label:x.name,value:x.sales}));const cats={};state.products.forEach(x=>{const k=detailCategory(x.name,x.category);cats[k]=(cats[k]||0)+x.sales});const catRows=Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(x=>({label:x[0],value:x[1]}));const period=periodParts();const operating=state.daily.filter(x=>x.total_sales>0);const best=[...operating].sort((a,b)=>b.total_sales-a.total_sales)[0],weak=[...operating].sort((a,b)=>a.total_sales-b.total_sales)[0];const beer=state.products.filter(x=>/ビール/.test(x.name)).reduce((s,x)=>s+x.sales,0);const night=period[1].value+period[2].value,total=period.reduce((s,x)=>s+x.value,0);const dailyDetail=state.daily.map(r=>[r.business_date,yen(r.total_sales),pct(dailyTotal?r.total_sales/dailyTotal:0),r.customers+'人',yen(r.avg_spend)]);const monthRows=state.monthly.map(r=>({label:ymLabel(r.month),value:r.sales}));$('host').innerHTML=`<div class="notice ok" style="margin-bottom:12px"><b>${label}表示</b>　すべてのグラフに実数・単位・構成比を表示しています。</div><div class="grid2"><div class="panel chart"><h3>${label} 日別売上推移</h3>${graphMeta('円','点の上＝売上額／明細＝期間内構成比')}${lineSvg(state.daily)}${chartDetailTable(['日付','売上','期間内構成比','客数','客単価'],dailyDetail)}</div><div class="panel chart"><h3>月別売上比較</h3>${graphMeta('円・%','棒の上＝売上額／下段＝累計構成比')}${barSvg(monthRows,'label','value',{total:state.monthly.reduce((s,x)=>s+x.sales,0)})}${chartDetailTable(['月','売上','累計構成比'],state.monthly.map(r=>[ymLabel(r.month),yen(r.sales),pct(state.overview.total_sales?r.sales/state.overview.total_sales:0)]))}</div><div class="panel chart"><h3>${label} 昼・夜・深夜 売上構成</h3>${graphMeta('円・%','円内と凡例に構成比を表示')}${donutSvg(period)}</div><div class="panel"><h3>${label} 商品売上 上位10</h3>${graphMeta('円・%','右側に売上額と商品売上内構成比')}${horizontalBars(top,{total:productTotal})}</div><div class="panel"><h3>${label} 商品詳細分類別 売上構成</h3>${graphMeta('円・%','右側に売上額と分類構成比')}${horizontalBars(catRows,{total:productTotal})}</div><div class="panel chart"><h3>${label} 時間帯別 売上</h3>${graphMeta('円・%','棒の上＝売上額／下段＝時間帯構成比')}${barSvg(state.hourly.map(x=>({label:x.hour,value:x.sales})),'label','value',{total:hourTotal})}${chartDetailTable(['時間','売上','構成比','発行数'],state.hourly.map(x=>[x.hour,yen(x.sales),pct(hourTotal?x.sales/hourTotal:0),x.issued_count]))}</div></div><div class="panel" style="margin-top:12px"><h3>経営の見どころ</h3><div class="grid3"><div class="insight"><b>最高売上日</b><br>${best?best.business_date+' '+yen(best.total_sales):'なし'}</div><div class="insight"><b>最低売上日（営業日）</b><br>${weak?weak.business_date+' '+yen(weak.total_sales):'なし'}</div><div class="insight"><b>夜＋深夜の構成</b><br>${pct(total?night/total:0)}</div><div class="insight"><b>ビール売上</b><br>${yen(beer)}（${pct(productTotal?beer/productTotal:0)}）</div><div class="insight"><b>営業日数</b><br>${operating.length}日</div><div class="insight"><b>休業・入力待ち</b><br>${state.daily.filter(x=>x.total_sales===0).length}日</div></div></div>`}
function renderManagementMonthly(){
 const rows=state.monthly.map((r,i)=>{
  const prev=i?state.monthly[i-1]:null,perDayCustomers=r.days?r.customers/r.days:0,projection=r.month===state.overview.month?state.overview.projection:r.sales;
  const dailyChange=prev&&prev.avg_daily?(r.avg_daily-prev.avg_daily)/prev.avg_daily:null;
  const customerChange=prev&&prev.days&&prev.customers?((perDayCustomers-(prev.customers/prev.days))/(prev.customers/prev.days)):null;
  const spendChange=prev&&prev.avg_spend?(r.avg_spend-prev.avg_spend)/prev.avg_spend:null;
  const fmt=v=>v===null?'—':`${v>=0?'+':''}${(v*100).toFixed(1)}%`;
  return [ymLabel(r.month),yen(r.sales),r.days+'日',yen(r.avg_daily),fmt(dailyChange),perDayCustomers.toFixed(1)+'人',fmt(customerChange),yen(r.avg_spend),fmt(spendChange),yen(projection)];
 });
 const latest=state.monthly[state.monthly.length-1],prev=state.monthly[state.monthly.length-2];
 let insights='<div class="notice">比較できる前月データがありません。</div>';
 if(latest&&prev){
  const daily=(latest.avg_daily-prev.avg_daily)/prev.avg_daily,spend=(latest.avg_spend-prev.avg_spend)/prev.avg_spend;
  const latestCust=latest.customers/latest.days,prevCust=prev.customers/prev.days,cust=(latestCust-prevCust)/prevCust;
  const drivers=[['平均日商',daily],['1日平均客数',cust],['客単価',spend]];
  insights=drivers.map(x=>`<div class="insight"><b>${x[0]}</b><br><span class="${x[1]>=0?'up':'down'}">${x[1]>=0?'改善':'低下'} ${Math.abs(x[1]*100).toFixed(1)}%</span><div class="sub">${ymLabel(prev.month)}との比較</div></div>`).join('');
 }
 $('host').innerHTML=`<div class="notice ok" style="margin-bottom:12px"><b>月途中の月は、売上合計ではなく平均日商・客数・客単価で比較します。</b> 着地見込みは現在の平均日商×27営業日の参考値で、確定値ではありません。</div><div class="grid3">${insights}</div><div class="panel" style="margin-top:12px"><h3>月別 経営指標</h3>${table(['月','売上','営業日','平均日商','前月比','1日平均客数','前月比','客単価','前月比','着地・確定'],rows,true)}</div><div class="panel" style="margin-top:12px"><h3>読み方</h3><div class="insight"><b>売上の要因</b><br>売上は「営業日数 × 1日平均客数 × 客単価」で確認します。月途中は営業日数が少ないため、売上合計だけの前月比較はしません。</div><div class="insight"><b>公開範囲</b><br>店舗全体の集計値だけを表示し、個人名・給与明細・通帳画像・口座情報は表示しません。</div></div>`;
}
function renderMonthly(){const grand=state.monthly.reduce((s,x)=>s+x.sales,0);const rows=state.monthly.map((r,i)=>{const prev=i?state.monthly[i-1]:null;const change=prev&&prev.sales?((r.sales-prev.sales)/prev.sales):null;return[ymLabel(r.month),yen(r.sales),pct(grand?r.sales/grand:0),r.days+'日',yen(r.avg_daily),r.customers+'人',yen(r.avg_spend),change===null?'—':`${change>=0?'+':''}${(change*100).toFixed(1)}%`]});$('host').innerHTML=`<div class="grid2"><div class="panel chart"><h3>月別売上</h3>${graphMeta('円・%','売上額と累計売上内の構成比')}${barSvg(state.monthly.map(x=>({label:ymLabel(x.month),value:x.sales})),'label','value',{total:grand})}</div><div class="panel chart"><h3>月別平均日商</h3>${graphMeta('円','棒の上に平均日商を表示')}${barSvg(state.monthly.map(x=>({label:ymLabel(x.month),value:x.avg_daily})),'label','value',{showShare:false})}</div></div><div class="panel" style="margin-top:12px">${table(['月','売上','累計構成比','営業日数','平均日商','客数','客単価','前月比'],rows)}</div>`}
function weekdayName(d){return ['日','月','火','水','木','金','土'][new Date(d+'T00:00:00').getDay()]}
function renderDaily(){const rows=state.daily.map(r=>{const status=r.total_sales>0?'営業':(/休業|休日/.test(r.notes||'')?'休業':'入力待ち');return[r.business_date,weekdayName(r.business_date),status,yen(r.total_sales),r.customers,yen(r.avg_spend),r.issued_count,r.net_count,yen(r.lunch_sales),yen(r.evening_sales),yen(r.late_sales),r.notes||'']});$('host').innerHTML=`<div class="panel">${table(['日付','曜','状態','売上','客数','客単価','発行数','正味出数','昼','夜','深夜','備考'],rows,true)}</div>`}
